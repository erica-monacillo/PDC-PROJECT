events {
    worker_connections 1024;
}

http {
    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr "$request" '
                    '$status upstream:$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Upstream: Round Robin Load Balancer ──────────────────
    upstream pdc_backend {
        # Round Robin (default) - distributes requests evenly
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;
    }

    # ── Socket.IO: Sticky Sessions (same client = same worker)
    # Required because Socket.IO needs persistent connection
    upstream pdc_socketio {
        ip_hash; # same IP always goes to same worker
        server 127.0.0.1:3001;
        server 127.0.0.1:3002;
        server 127.0.0.1:3003;
    }

    server {
        listen 80;
        server_name _;

        # ── REST API: Round Robin Load Balancing ─────────────
        location /api/ {
            proxy_pass         http://pdc_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Socket.IO: Sticky Session (ip_hash) ──────────────
        location /socket.io/ {
            proxy_pass         http://pdc_socketio;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            # Longer timeout for WebSocket
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Root: Round Robin ─────────────────────────────────
        location / {
            proxy_pass         http://pdc_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Health Check ──────────────────────────────────────
        location /nginx-health {
            access_log off;
            return 200 'PDC Nginx Load Balancer OK\n';
            add_header Content-Type text/plain;
        }
    }
}