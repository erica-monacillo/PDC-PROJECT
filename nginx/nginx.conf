events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr "$request" '
                    '$status upstream:$upstream_addr';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    upstream pdc_backend {
        server pdc-app-1:3001;
        server pdc-app-2:3002;
        server pdc-app-3:3003;
    }

    upstream pdc_socketio {
        ip_hash;
        server pdc-app-1:3001;
        server pdc-app-2:3002;
        server pdc-app-3:3003;
    }

    server {
        listen 80;
        server_name _;

        location /api/ {
            proxy_pass         http://pdc_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        location /socket.io/ {
            proxy_pass         http://pdc_socketio;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_pass         http://pdc_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade         $http_upgrade;
            proxy_set_header   Connection      "upgrade";
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /nginx-health {
            access_log off;
            return 200 'PDC Nginx Load Balancer OK\n';
            add_header Content-Type text/plain;
        }
    }
}