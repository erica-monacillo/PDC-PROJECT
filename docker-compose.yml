services:
  postgres:
    image: postgres:15-alpine
    container_name: pdc-postgres
    environment:
      - POSTGRES_DB=sweets_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sweets_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pdc-app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdc-app-1
    expose:
      - "3001"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:password@pdc-postgres:5432/sweets_db
      - DB_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  pdc-app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdc-app-2
    expose:
      - "3002"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DATABASE_URL=postgresql://postgres:password@pdc-postgres:5432/sweets_db
      - DB_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3002/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  pdc-app-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdc-app-3
    expose:
      - "3003"
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DATABASE_URL=postgresql://postgres:password@pdc-postgres:5432/sweets_db
      - DB_SSL=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3003/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 180s

  pdc-nginx:
    image: nginx:stable-alpine
    container_name: pdc-nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      pdc-app-1:
        condition: service_healthy
      pdc-app-2:
        condition: service_healthy
      pdc-app-3:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  locust:
    image: locustio/locust
    container_name: locust
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py
    command: -f /mnt/locust/locustfile.py --host http://pdc-nginx-lb:80
    depends_on:
      pdc-nginx:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet

volumes:
  pgdata:

networks:
  appnet:
    driver: bridge